name: OKBase Firebase Sync

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: hrdlaaaa/okbase-firebase-sync
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run sync
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SYNC_EMAIL: ${{ secrets.FIREBASE_SYNC_EMAIL }}
          FIREBASE_SYNC_PASSWORD: ${{ secrets.FIREBASE_SYNC_PASSWORD }}
          OKBASE_URL: ${{ secrets.OKBASE_URL }}
          OKBASE_USERNAME: ${{ secrets.OKBASE_USERNAME }}
          OKBASE_PASSWORD: ${{ secrets.OKBASE_PASSWORD }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: node sync.js
        timeout-minutes: 3
